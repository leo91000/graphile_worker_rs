[package]
name = "graphile_worker"
version = "0.12.0"
edition = "2021"
license = "MIT"
description = "High performance Rust/PostgreSQL job queue (also suitable for getting jobs generated by PostgreSQL triggers/functions out into a different work queue)"
homepage = "https://docs.rs/graphile_worker"
documentation = "https://docs.rs/graphile_worker"
repository = "https://github.com/leo91000/graphile_worker_rs"
readme = "README.md"
keywords = ["jobs", "queue", "postgres", "worker"]
categories = ["asynchronous", "database"]

[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.dependencies]
tokio = { version = "1.52.3" }
tokio-util = { version = "0.7.18" }
serde = { version = "1.0.228", features = ["derive"] }
json5 = "1.3.1"
nom = "8.0.0"
serde_json = "1.0.149"
serde_qs = "1.1.1"
thiserror = "2.0.18"
chrono = { version = "0.4.44", features = ["serde"] }
sqlx = { version = "0.8.6", features = [
  "chrono",
  "postgres",
  "json",
  "macros",
], default-features = false }
getset = "0.1.6"
tracing = "0.1.44"
once_cell = "1.21.4"
anyhow = "1.0.102"
futures = "0.3.32"
syn = "2.0.117"
quote = "1.0.45"
indoc = "2.0.7"
derive_builder = "0.20.2"
url = "2.5.8"

[features]
default = ["runtime-tokio", "tls-rustls", "driver-sqlx"]
runtime-tokio = [
  "graphile_worker_database/runtime-tokio",
  "sqlx?/runtime-tokio",
  "graphile_worker_crontab_runner/runtime-tokio",
  "graphile_worker_job/runtime-tokio",
  "graphile_worker_ctx/runtime-tokio",
  "graphile_worker_migrations/runtime-tokio",
  "graphile_worker_lifecycle_hooks/runtime-tokio",
  "graphile_worker_task_handler/runtime-tokio",
  "graphile_worker_task_details/runtime-tokio",
  "graphile_worker_shutdown_signal/runtime-tokio",
  "graphile_worker_runtime/runtime-tokio",
]
runtime-async-std = [
  "graphile_worker_database/runtime-async-std",
  "sqlx?/runtime-async-std",
  "graphile_worker_crontab_runner/runtime-async-std",
  "graphile_worker_job/runtime-async-std",
  "graphile_worker_ctx/runtime-async-std",
  "graphile_worker_migrations/runtime-async-std",
  "graphile_worker_lifecycle_hooks/runtime-async-std",
  "graphile_worker_task_handler/runtime-async-std",
  "graphile_worker_task_details/runtime-async-std",
  "graphile_worker_shutdown_signal/runtime-async-std",
  "graphile_worker_runtime/runtime-async-std",
]
tls-native-tls = [
  "graphile_worker_database/tls-native-tls",
  "sqlx?/tls-native-tls",
  "graphile_worker_crontab_runner/tls-native-tls",
  "graphile_worker_migrations/tls-native-tls",
]
tls-rustls = [
  "graphile_worker_database/tls-rustls",
  "sqlx?/tls-rustls",
  "graphile_worker_crontab_runner/tls-rustls",
  "graphile_worker_migrations/tls-rustls",
]
driver-sqlx = [
  "graphile_worker_database/driver-sqlx",
  "graphile_worker_job/driver-sqlx",
  "graphile_worker_ctx/driver-sqlx",
  "graphile_worker_lifecycle_hooks/driver-sqlx",
  "graphile_worker_crontab_runner/driver-sqlx",
  "graphile_worker_migrations/driver-sqlx",
  "sqlx",
]
driver-tokio-postgres = [
  "runtime-tokio",
  "graphile_worker_database/driver-tokio-postgres",
  "graphile_worker_crontab_runner/driver-tokio-postgres",
  "graphile_worker_migrations/driver-tokio-postgres",
]
opentelemetry_0_30 = [
    "opentelemetry-30",
    "tracing-opentelemetry-30",
]
opentelemetry_0_31 = [
    "opentelemetry",
    "tracing-opentelemetry",
]
[dependencies]
graphile_worker_crontab_runner = { path = "./crates/graphile-worker-crontab-runner", version = "0.7.5", default-features = false }
graphile_worker_crontab_types = { path = "./crates/graphile-worker-crontab-types", version = "0.5.15" }
graphile_worker_crontab_parser = { path = "./crates/graphile-worker-crontab-parser", version = "0.5.19" }
graphile_worker_job = { path = "./crates/graphile-worker-job", version = "0.1.13", default-features = false }
graphile_worker_ctx = { path = "./crates/graphile-worker-ctx", version = "0.5.0", default-features = false }
graphile_worker_migrations = { path = "./crates/graphile-worker-migrations", version = "0.4.15", default-features = false }
graphile_worker_task_handler = { path = "./crates/graphile-worker-task-handler", version = "0.5.15", default-features = false }
graphile_worker_shutdown_signal = { path = "./crates/graphile-worker-shutdown-signal", version = "0.3.12", default-features = false }
graphile_worker_extensions = { path = "./crates/graphile-worker-extensions", version = "0.1.7" }
graphile_worker_lifecycle_hooks = { path = "./crates/graphile-worker-lifecycle-hooks", version = "0.3.0", default-features = false }
graphile_worker_job_spec = { path = "./crates/graphile-worker-job-spec", version = "0.1.3" }
graphile_worker_task_details = { path = "./crates/graphile-worker-task-details", version = "0.1.3", default-features = false }
graphile_worker_runtime = { path = "./crates/graphile-worker-runtime", version = "0.1.1", default-features = false }
graphile_worker_database = { path = "./crates/graphile-worker-database", version = "0.1.1", default-features = false }
chrono = { version = "0.4.44", features = ["serde"] }
futures = "0.3.32"
getset = "0.1.6"
num_cpus = "1.17.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sqlx = { version = "0.8.6", features = [
  "postgres",
  "json",
  "chrono",
  "macros",
], default-features = false, optional = true }
thiserror = "2.0.18"
tracing = "0.1.44"
tokio = { version = "1.52.3", features = ["macros", "signal"] }
rand = "0.10.1"
hex = "0.4.3"
indoc = "2.0.7"
derive_builder = "0.20.2"
opentelemetry-30 = { package = "opentelemetry", version = "0.30.0", optional = true }
opentelemetry = { version = "0.31", optional = true }
tracing-opentelemetry-30 = { package = "tracing-opentelemetry", version = "0.31.0", optional = true }
tracing-opentelemetry = { version = "0.32.1", optional = true }

[dev-dependencies]
sqlx = { workspace = true, features = ["runtime-tokio", "tls-rustls"] }
tokio = { version = "1.52.3", features = ["io-util", "macros", "net", "rt-multi-thread", "signal", "sync", "time"] }
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
uuid = { version = "1.23.1", features = ["v7"] }
criterion = { version = "0.8.2", features = ["async_tokio"] }
url.workspace = true

[[bench]]
name = "job_operations"
harness = false

[[bench]]
name = "throughput"
harness = false

[[bench]]
name = "perf_test"
harness = false

[[bench]]
name = "failure"
harness = false

[[example]]
name = "app_state"
required-features = ["driver-sqlx"]

[[example]]
name = "batch_add_jobs"
required-features = ["driver-sqlx"]

[[example]]
name = "context_helpers"
required-features = ["driver-sqlx"]

[[example]]
name = "crontab"
required-features = ["driver-sqlx"]

[[example]]
name = "hooks"
required-features = ["driver-sqlx"]

[[example]]
name = "local_queue"
required-features = ["driver-sqlx"]

[[example]]
name = "run_once"
required-features = ["driver-sqlx"]

[[example]]
name = "sendable_worker"
required-features = ["driver-sqlx"]

[[example]]
name = "simple"
required-features = ["driver-sqlx"]
