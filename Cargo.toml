[package]
name = "graphile_worker"
version = "0.13.2"
edition = "2021"
license = "MIT"
description = "High performance Rust/PostgreSQL job queue (also suitable for getting jobs generated by PostgreSQL triggers/functions out into a different work queue)"
homepage = "https://docs.rs/graphile_worker"
documentation = "https://docs.rs/graphile_worker"
repository = "https://github.com/leo91000/graphile_worker_rs"
readme = "README.md"
keywords = ["jobs", "queue", "postgres", "worker"]
categories = ["asynchronous", "database"]

[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.dependencies]
graphile_worker = { path = ".", version = "0.13.2", default-features = false }
graphile_worker_admin_api = { path = "crates/graphile-worker-admin-api", version = "0.1.1" }
graphile_worker_admin_ui = { path = "crates/graphile-worker-admin-ui", version = "0.2.0" }
graphile_worker_admin_ui_client = { path = "crates/graphile-worker-admin-ui-client", version = "0.1.2" }
graphile_worker_crontab_parser = { path = "crates/graphile-worker-crontab-parser", version = "0.5.22" }
graphile_worker_crontab_runner = { path = "crates/graphile-worker-crontab-runner", version = "0.7.8", default-features = false }
graphile_worker_crontab_types = { path = "crates/graphile-worker-crontab-types", version = "0.5.16" }
graphile_worker_ctx = { path = "crates/graphile-worker-ctx", version = "0.6.0", default-features = false }
graphile_worker_database = { path = "crates/graphile-worker-database", version = "0.1.4", default-features = false }
graphile_worker_extensions = { path = "crates/graphile-worker-extensions", version = "0.1.8" }
graphile_worker_job = { path = "crates/graphile-worker-job", version = "0.2.0", default-features = false }
graphile_worker_job_spec = { path = "crates/graphile-worker-job-spec", version = "0.1.4" }
graphile_worker_lifecycle_hooks = { path = "crates/graphile-worker-lifecycle-hooks", version = "0.3.3", default-features = false }
graphile_worker_migrations = { path = "crates/graphile-worker-migrations", version = "0.4.18", default-features = false }
graphile_worker_migrations_core = { path = "crates/graphile-worker-migrations-core", version = "0.1.0" }
graphile_worker_migrations_macros = { path = "crates/graphile-worker-migrations-macros", version = "0.1.0" }
graphile_worker_queries = { path = "crates/graphile-worker-queries", version = "0.1.0", default-features = false }
graphile_worker_recovery = { path = "crates/graphile-worker-recovery", version = "0.1.0", default-features = false }
graphile_worker_runtime = { path = "crates/graphile-worker-runtime", version = "0.1.3", default-features = false }
graphile_worker_shutdown_signal = { path = "crates/graphile-worker-shutdown-signal", version = "0.3.13", default-features = false }
graphile_worker_task_details = { path = "crates/graphile-worker-task-details", version = "0.1.5", default-features = false }
graphile_worker_task_handler = { path = "crates/graphile-worker-task-handler", version = "0.5.18", default-features = false }
graphile_worker_utils = { path = "crates/graphile-worker-utils", version = "0.1.0", default-features = false }
anyhow = "1.0.102"
async-channel = "2.5.0"
async-lock = "3.4.2"
async-signal = "0.2.14"
async-std = "1.13.2"
axum = "0.8.9"
base64 = "0.22.1"
chrono = { version = "0.4.45", features = ["serde"] }
clap = "4.6.1"
criterion = "0.8.2"
deadpool-postgres = "0.14.1"
derive_builder = "0.20.2"
event-listener = "5.4.1"
futures = "0.3.32"
getset = "0.1.7"
gloo-net = "0.7.0"
gloo-timers = "0.4.0"
hex = "0.4.3"
indoc = "2.0.7"
js-sys = "=0.3.102"
json5 = "1.3.1"
leptos = "0.8.19"
nom = "8.0.0"
num_cpus = "1.17.0"
once_cell = "1.21.4"
opentelemetry = "0.31"
opentelemetry-30 = { package = "opentelemetry", version = "0.30.0" }
opentelemetry-32 = { package = "opentelemetry", version = "0.32.0" }
proc-macro2 = "1.0.106"
quote = "1.0.45"
rand = "0.10.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
serde_qs = "1.1.2"
syn = "2.0.118"
subtle = "2.6.1"
thiserror = "2.0.18"
tokio = { version = "1.52.3" }
tokio-postgres = { version = "0.7.18", default-features = false }
tokio-stream = "0.1.18"
tokio-util = { version = "0.7.18" }
sqlx = { version = "0.9.0", features = [
  "chrono",
  "postgres",
  "json",
  "macros",
], default-features = false }
tracing = "0.1.44"
tracing-opentelemetry = "0.32.1"
tracing-opentelemetry-30 = { package = "tracing-opentelemetry", version = "0.31.0" }
tracing-opentelemetry-32 = { package = "tracing-opentelemetry", version = "0.33.0" }
tracing-subscriber = "0.3.23"
url = "2.5.8"
uuid = "1.23.3"
wasm-bindgen = "=0.2.125"
wasm-bindgen-futures = "=0.4.75"
web-sys = "=0.3.102"
windows-sys = "0.61.2"

[features]
default = ["runtime-tokio", "tls-rustls", "driver-sqlx"]
runtime-tokio = [
  "graphile_worker_database/runtime-tokio",
  "sqlx?/runtime-tokio",
  "graphile_worker_crontab_runner/runtime-tokio",
  "graphile_worker_job/runtime-tokio",
  "graphile_worker_ctx/runtime-tokio",
  "graphile_worker_migrations/runtime-tokio",
  "graphile_worker_lifecycle_hooks/runtime-tokio",
  "graphile_worker_task_handler/runtime-tokio",
  "graphile_worker_task_details/runtime-tokio",
  "graphile_worker_queries/runtime-tokio",
  "graphile_worker_recovery/runtime-tokio",
  "graphile_worker_utils/runtime-tokio",
  "graphile_worker_shutdown_signal/runtime-tokio",
  "graphile_worker_runtime/runtime-tokio",
]
runtime-async-std = [
  "graphile_worker_database/runtime-async-std",
  "sqlx?/runtime-async-std",
  "graphile_worker_crontab_runner/runtime-async-std",
  "graphile_worker_job/runtime-async-std",
  "graphile_worker_ctx/runtime-async-std",
  "graphile_worker_migrations/runtime-async-std",
  "graphile_worker_lifecycle_hooks/runtime-async-std",
  "graphile_worker_task_handler/runtime-async-std",
  "graphile_worker_task_details/runtime-async-std",
  "graphile_worker_queries/runtime-async-std",
  "graphile_worker_recovery/runtime-async-std",
  "graphile_worker_utils/runtime-async-std",
  "graphile_worker_shutdown_signal/runtime-async-std",
  "graphile_worker_runtime/runtime-async-std",
]
tls-native-tls = [
  "graphile_worker_database/tls-native-tls",
  "sqlx?/tls-native-tls",
  "graphile_worker_crontab_runner/tls-native-tls",
  "graphile_worker_migrations/tls-native-tls",
  "graphile_worker_queries/tls-native-tls",
  "graphile_worker_recovery/tls-native-tls",
  "graphile_worker_utils/tls-native-tls",
]
tls-rustls = [
  "graphile_worker_database/tls-rustls",
  "sqlx?/tls-rustls",
  "graphile_worker_crontab_runner/tls-rustls",
  "graphile_worker_migrations/tls-rustls",
  "graphile_worker_queries/tls-rustls",
  "graphile_worker_recovery/tls-rustls",
  "graphile_worker_utils/tls-rustls",
]
driver-sqlx = [
  "graphile_worker_database/driver-sqlx",
  "graphile_worker_job/driver-sqlx",
  "graphile_worker_ctx/driver-sqlx",
  "graphile_worker_lifecycle_hooks/driver-sqlx",
  "graphile_worker_crontab_runner/driver-sqlx",
  "graphile_worker_migrations/driver-sqlx",
  "graphile_worker_queries/driver-sqlx",
  "graphile_worker_recovery/driver-sqlx",
  "graphile_worker_utils/driver-sqlx",
  "sqlx",
]
driver-tokio-postgres = [
  "runtime-tokio",
  "graphile_worker_database/driver-tokio-postgres",
  "graphile_worker_crontab_runner/driver-tokio-postgres",
  "graphile_worker_migrations/driver-tokio-postgres",
  "graphile_worker_queries/driver-tokio-postgres",
  "graphile_worker_recovery/driver-tokio-postgres",
  "graphile_worker_utils/driver-tokio-postgres",
]
opentelemetry_0_30 = [
    "opentelemetry-30",
    "tracing-opentelemetry-30",
    "graphile_worker_queries/opentelemetry_0_30",
    "graphile_worker_utils/opentelemetry_0_30",
]
opentelemetry_0_31 = [
    "opentelemetry",
    "tracing-opentelemetry",
    "graphile_worker_queries/opentelemetry_0_31",
    "graphile_worker_utils/opentelemetry_0_31",
]
opentelemetry_0_32 = [
    "opentelemetry-32",
    "tracing-opentelemetry-32",
    "graphile_worker_queries/opentelemetry_0_32",
    "graphile_worker_utils/opentelemetry_0_32",
]
[dependencies]
graphile_worker_crontab_runner.workspace = true
graphile_worker_crontab_types.workspace = true
graphile_worker_crontab_parser.workspace = true
graphile_worker_job.workspace = true
graphile_worker_ctx.workspace = true
graphile_worker_migrations.workspace = true
graphile_worker_task_handler.workspace = true
graphile_worker_shutdown_signal.workspace = true
graphile_worker_extensions.workspace = true
graphile_worker_lifecycle_hooks.workspace = true
graphile_worker_job_spec.workspace = true
graphile_worker_task_details.workspace = true
graphile_worker_queries.workspace = true
graphile_worker_recovery.workspace = true
graphile_worker_runtime.workspace = true
graphile_worker_database.workspace = true
graphile_worker_utils.workspace = true
chrono.workspace = true
futures.workspace = true
getset.workspace = true
num_cpus.workspace = true
serde.workspace = true
serde_json.workspace = true
sqlx = { workspace = true, features = [
  "postgres",
  "json",
  "chrono",
  "macros",
], optional = true }
thiserror.workspace = true
tracing.workspace = true
tokio = { workspace = true, features = ["macros", "signal"] }
rand.workspace = true
hex.workspace = true
indoc.workspace = true
derive_builder.workspace = true
opentelemetry-30 = { workspace = true, optional = true }
opentelemetry = { workspace = true, optional = true }
opentelemetry-32 = { workspace = true, optional = true }
tracing-opentelemetry-30 = { workspace = true, optional = true }
tracing-opentelemetry = { workspace = true, optional = true }
tracing-opentelemetry-32 = { workspace = true, optional = true }

[dev-dependencies]
sqlx = { workspace = true, features = ["runtime-tokio", "tls-rustls"] }
deadpool-postgres.workspace = true
tokio = { workspace = true, features = ["io-util", "macros", "net", "rt-multi-thread", "signal", "sync", "time"] }
tokio-postgres = { workspace = true, features = [
  "array-impls",
  "with-chrono-0_4",
  "with-serde_json-1",
] }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
uuid = { workspace = true, features = ["v7"] }
criterion = { workspace = true, features = ["async_tokio"] }
url.workspace = true

[[bench]]
name = "job_operations"
harness = false

[[bench]]
name = "throughput"
harness = false

[[bench]]
name = "perf_test"
harness = false

[[bench]]
name = "failure"
harness = false

[[example]]
name = "app_state"
required-features = ["driver-sqlx"]

[[example]]
name = "batch_add_jobs"
required-features = ["driver-sqlx"]

[[example]]
name = "context_helpers"
required-features = ["driver-sqlx"]

[[example]]
name = "crontab"
required-features = ["driver-sqlx"]

[[example]]
name = "hooks"
required-features = ["driver-sqlx"]

[[example]]
name = "local_queue"
required-features = ["driver-sqlx"]

[[example]]
name = "run_once"
required-features = ["driver-sqlx"]

[[example]]
name = "sendable_worker"
required-features = ["driver-sqlx"]

[[example]]
name = "simple"
required-features = ["driver-sqlx"]
