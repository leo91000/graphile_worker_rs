name: Docs

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - .github/workflows/docs.yml
      - justfile
  pull_request:
    paths:
      - docs/**
      - .github/workflows/docs.yml
      - justfile

# Jobs opt into the GitHub token permissions they need.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Install mdBook
        run: cargo install mdbook --vers "^0.4" --locked
      - name: Build docs
        run: mdbook build docs
      - name: Configure Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: docs/book

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # Required to publish the built mdBook artifact to GitHub Pages.
      pages: write
      # Required for OIDC authentication during GitHub Pages deployment.
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
